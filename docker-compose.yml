# Single-VM CTC deployment. Three services + a one-shot cert init, sharing a
# SQLite DB and cert volume.
#
#   1. preflight:  sh scripts/preflight.sh        # validate .env before deploying
#   2. start:      docker compose up -d --build    # gencert runs automatically first
#   3. health:     docker compose ps               # all services should be "healthy"
#
# Config comes from .env (copy .env.example → .env and fill it in).

services:
  # The MITM proxy (data plane). VPN/internal-only — see PROXY_BIND in .env.
  # Reads encrypted giver PATs from the shared DB (CTC_DB_PATH + CTC_SECRET_KEY),
  # so no REAL_PAT here: givers upload their PAT via the website.
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "proxy.py"]
    restart: unless-stopped
    depends_on:
      gencert:
        condition: service_completed_successfully
      controlplane:
        condition: service_healthy
    environment:
      CTC_DB_PATH: /data/ctc.db
      CTC_SECRET_KEY: ${CTC_SECRET_KEY}
      GHE_DOMAIN: ${GHE_DOMAIN}
      REAL_GHE_HOST: ${REAL_GHE_HOST}
      CERT_FILE: /certs/cert.pem
      KEY_FILE: /certs/key.pem
      PORT: "8080"
      # UPSTREAM_CA_BUNDLE: /certs/corp-ca.pem   # uncomment if GHE uses a corporate CA
    # Bind to an internal/VPN interface only. Default 127.0.0.1 = localhost-only;
    # set PROXY_BIND in .env to the VM's VPN-facing IP so teammates can reach it.
    ports:
      - "${PROXY_BIND:-127.0.0.1}:8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1',8080),3).close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ctcdata:/data
      - ctccerts:/certs:ro

  # The control plane (auth, tokens, dashboards). Internal only — Caddy fronts it.
  controlplane:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "api_server.py"]
    restart: unless-stopped
    depends_on:
      gencert:
        condition: service_completed_successfully
    environment:
      CTC_DB_PATH: /data/ctc.db
      CONTROL_PLANE_PORT: "8090"
      CTC_SECRET_KEY: ${CTC_SECRET_KEY}
      # CTC_WEB_TRANSPORT must match the Caddyfile choice:
      #   http  → use Caddyfile.http  (set CADDYFILE=Caddyfile.http in .env)
      #   https → use Caddyfile       (default, Let's Encrypt)
      # The control plane validates that CTC_APP_ORIGIN scheme == CTC_WEB_TRANSPORT
      # and refuses to start on a mismatch.
      CTC_WEB_TRANSPORT: ${CTC_WEB_TRANSPORT:-http}
      CTC_APP_ORIGIN: ${CTC_WEB_TRANSPORT:-http}://${CTC_DOMAIN}
      GHE_OAUTH_CLIENT_ID: ${GHE_OAUTH_CLIENT_ID}
      GHE_OAUTH_CLIENT_SECRET: ${GHE_OAUTH_CLIENT_SECRET}
      GHE_OAUTH_REDIRECT_URI: ${CTC_WEB_TRANSPORT:-http}://${CTC_DOMAIN}/auth/callback
      GHE_OAUTH_BASE: ${GHE_OAUTH_BASE}
      GHE_API_BASE: ${GHE_API_BASE}
      CTC_ADMINS: ${CTC_ADMINS:-}
      CTC_CA_CERT: /certs/cert.pem
      # Deployment mode knobs — all optional, defaults shown
      CTC_AUTH_MODE: ${CTC_AUTH_MODE:-email}
      CTC_PARTICIPANTS_MODE: ${CTC_PARTICIPANTS_MODE:-givers_only}
      CTC_SHARED_POOL: ${CTC_SHARED_POOL:-off}
      CTC_EMAIL_BACKEND: ${CTC_EMAIL_BACKEND:-console}
      CTC_SMTP_HOST: ${CTC_SMTP_HOST:-}
      CTC_SMTP_PORT: ${CTC_SMTP_PORT:-587}
      CTC_SMTP_USER: ${CTC_SMTP_USER:-}
      CTC_SMTP_PASS: ${CTC_SMTP_PASS:-}
      CTC_SMTP_FROM: ${CTC_SMTP_FROM:-}
      CTC_SMTP_STARTTLS: ${CTC_SMTP_STARTTLS:-1}
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8090/api/config', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ctcdata:/data
      - ctccerts:/certs:ro

  # Public edge: HTTPS or HTTP, web app, CLI assets, and reverse-proxy to the control plane.
  # Transport is selected by CADDYFILE (default = Caddyfile = HTTPS with TLS).
  # For plain HTTP (VPN/trusted LAN) set CADDYFILE=Caddyfile.http in .env.
  caddy:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        # Everything the web app + CLI assets need is derived from CTC_DOMAIN
        # (a hostname OR a raw IP — same VM serves the site and the proxy).
        VITE_API_BASE: ${CTC_WEB_TRANSPORT:-http}://${CTC_DOMAIN}/api
        VITE_CTC_HOST: ${CTC_DOMAIN}
        VITE_PROXY_HOST: ${CTC_DOMAIN}:8080
        # The PAT-help "Generate a token" link points at the GHE web host.
        VITE_GHE_HOST: https://${GHE_DOMAIN}
        CTC_DOMAIN: ${CTC_DOMAIN}
        # Baked into the served `ctc` so GH_HOST points at the real GHE host, not
        # the example.ghe.com placeholder (else Copilot validation fetch-fails).
        GHE_DOMAIN: ${GHE_DOMAIN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:2019/config/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      gencert:
        condition: service_completed_successfully
      controlplane:
        condition: service_healthy
    environment:
      CTC_DOMAIN: ${CTC_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./${CADDYFILE:-Caddyfile}:/etc/caddy/Caddyfile:ro
      - ctccerts:/certs:ro
      - caddydata:/data        # Caddy's Let's Encrypt certs (persist across restarts)

  # One-shot cert init: generates the proxy MITM cert into the shared cert volume.
  # Runs automatically as part of `up` (other services depend on it completing).
  # gen-cert.sh is idempotent, so re-running on every `up` is a no-op once certs exist.
  gencert:
    image: alpine:3.20
    environment:
      GHE_DOMAIN: ${GHE_DOMAIN}
      CTC_DOMAIN: ${CTC_DOMAIN}
    volumes:
      - ctccerts:/certs
      - ./scripts:/scripts:ro
    command: ["sh", "-c", "apk add --no-cache openssl >/dev/null && sh /scripts/gen-cert.sh /certs"]

volumes:
  ctcdata:
  ctccerts:
  caddydata:
